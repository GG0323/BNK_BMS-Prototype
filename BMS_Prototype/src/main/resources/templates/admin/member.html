<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="/js/admin/member.js" defer></script>
</head>
<body>
<h1>Member List Page</h1><hr>
<table>
	<thead>
		<tr>
			<th>id</th>
			<th>name</th>
			<th>role</th>
		</tr>
	</thead>
	<tbody>
		<tr th:each="m : ${members}">
			<td th:text="${m.username}"></td>
			<td th:text="${m.name}"></td>
			<td th:text="${m.role}"></td>
		</tr>
	</tbody>
</table>
</body>
</html>
